name: Heartbeat

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: heartbeat-runner
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Execute heartbeat
        env:
          HEARTBEAT_COMMIT: "true"
          HEARTBEAT_PUSH: "true"
        run: node scripts/heartbeat.js
