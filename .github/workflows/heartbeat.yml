name: Heartbeat

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without commit/push"
        required: false
        default: false
        type: boolean
      commit_changes:
        description: "Commit heartbeat report updates"
        required: false
        default: true
        type: boolean
      push_changes:
        description: "Push heartbeat commits to remote"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: heartbeat-runner
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Execute heartbeat
        env:
          HEARTBEAT_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
          HEARTBEAT_COMMIT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.commit_changes || 'true' }}
          HEARTBEAT_PUSH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.push_changes || 'true' }}
        run: node scripts/heartbeat.js
